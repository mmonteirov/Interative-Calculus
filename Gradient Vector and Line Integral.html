<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explorador Matemático 3D</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/10.4.0/math.min.js"></script>
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            },
            svg: { fontCache: 'global' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" defer></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f8fafc;
            color: #0f172a;
        }
        #contentor-app {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 1400px;
            padding: 1.5rem;
            box-sizing: border-box;
            gap: 1.5rem;
        }
        #cabecalho {
            background-color: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 20px -5px rgba(0, 0, 0, 0.1);
            padding: 1.5rem;
            text-align: center;
            border: 1px solid #e2e8f0;
        }
        #painel-principal {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            flex-grow: 1;
        }
        #zona-configuracao {
            background-color: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 20px -5px rgba(0, 0, 0, 0.1);
            padding: 1.5rem;
            overflow-y: auto;
            border: 1px solid #e2e8f0;
        }
        #visualizador-3d {
            flex-grow: 1;
            background-color: #ffffff;
            border-radius: 16px;
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.05);
            min-height: 500px;
            position: relative;
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .campo-entrada {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            margin-bottom: 1rem;
        }
        label {
            font-weight: 600;
            color: #475569;
            font-size: 0.85rem;
        }
        input {
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            padding: 0.6rem 0.8rem;
            font-size: 0.95rem;
            transition: all 0.2s;
            background-color: #fdfdfd;
        }
        input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        .grupo-botoes {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        button {
            background-color: #2563eb;
            color: white;
            padding: 0.7rem 1.2rem;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
            font-size: 0.9rem;
        }
        button:hover {
            background-color: #1d4ed8;
            transform: translateY(-1px);
        }
        #painel-informativo {
            margin-top: 1.5rem;
            padding: 1.25rem;
            background-color: #f8fafc;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            min-height: 100px;
        }
        .titulo-seccao {
            font-size: 1rem;
            font-weight: 700;
            color: #334155;
            margin-top: 1.5rem;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .titulo-seccao::after {
            content: '';
            flex-grow: 1;
            height: 1px;
            background-color: #e2e8f0;
        }
        @media (min-width: 1024px) {
            #painel-principal { flex-direction: row; }
            #zona-configuracao { width: 380px; flex-shrink: 0; }
        }
    </style>
</head>
<body>

    <div id="contentor-app">
        <header id="cabecalho">
            <h1 class="text-2xl font-black text-slate-800">Cálculo 3D Interativo</h1>
            <p class="text-slate-500 text-sm">Gradientes e Integrais em Superfícies $z = f(x, y)$</p>
        </header>

        <main id="painel-principal">
            <aside id="zona-configuracao">
                <div class="campo-entrada">
                    <label for="input-funcao">Função da Superfície $f(x, y)$</label>
                    <input type="text" id="input-funcao" value="sin(x) * cos(y)">
                </div>
                
                <div class="grupo-botoes">
                    <button id="btn-renderizar">Plotar Mapa</button>
                    <button id="btn-integral-area" class="bg-slate-600 hover:bg-slate-700">Volume (Integral)</button>
                </div>

                <div class="titulo-seccao">Trajetória (Integral de Linha)</div>
                
                <div class="campo-entrada">
                    <label>$x(t)$</label>
                    <input type="text" id="input-xt" value="cos(t)">
                </div>
                <div class="campo-entrada">
                    <label>$y(t)$</label>
                    <input type="text" id="input-yt" value="sin(t)">
                </div>
                <div class="campo-entrada">
                    <label>Intervalo de $t$ (ex: 0, 2*pi)</label>
                    <input type="text" id="input-t-range" value="0, 2*pi">
                </div>
                
                <button id="btn-tracar-linha" class="w-full bg-amber-500 hover:bg-amber-600">Tracar Curva</button>

                <div id="painel-informativo">
                    <div id="area-resultados">
                        <p class="text-slate-400 italic text-sm text-center">Clique na superfície para obter o vetor gradiente no ponto selecionado.</p>
                    </div>
                </div>
            </aside>

            <section id="visualizador-3d"></section>
        </main>
    </div>

    <script>
        window.onload = function () {
            const cena = new THREE.Scene();
            cena.background = new THREE.Color(0xffffff);
            
            const contentor = document.getElementById('visualizador-3d');
            const camara = new THREE.PerspectiveCamera(75, contentor.clientWidth / contentor.clientHeight, 0.1, 1000);
            camara.position.set(10, 10, 10);
            
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(contentor.clientWidth, contentor.clientHeight);
            contentor.appendChild(renderer.domElement);

            const controlos = new THREE.OrbitControls(camara, renderer.domElement);
            controlos.enableDamping = true;

            const luz1 = new THREE.AmbientLight(0xffffff, 0.6);
            cena.add(luz1);
            const luz2 = new THREE.DirectionalLight(0xffffff, 0.7);
            luz2.position.set(10, 20, 10);
            cena.add(luz2);

            cena.add(new THREE.GridHelper(20, 20, 0xe2e8f0, 0xf1f5f9));

            let malhaSuperficie = null;
            let setaVetor = null;
            let objetoCurva = null;
            
            const rato = new THREE.Vector2();
            const raycaster = new THREE.Raycaster();
            const infoPainel = document.getElementById('area-resultados');

            function limparFormula(txt) {
                return txt.toLowerCase().replace(/tg/g, 'tan');
            }

            function desenharSuperficie() {
                try {
                    if (malhaSuperficie) {
                        cena.remove(malhaSuperficie);
                        malhaSuperficie.geometry.dispose();
                        malhaSuperficie.material.dispose();
                    }
                    if (setaVetor) cena.remove(setaVetor);

                    const exp = limparFormula(document.getElementById('input-funcao').value);
                    const calc = math.parser();
                    calc.evaluate(`f(x, y) = ${exp}`);
                    
                    const geoBase = new THREE.PlaneGeometry(20, 20, 100, 100);
                    const posicoes = geoBase.attributes.position;
                    const vertices = [];

                    for (let i = 0; i < posicoes.count; i++) {
                        const px = posicoes.getX(i);
                        const py = posicoes.getY(i);
                        const pz = calc.evaluate(`f(${px}, ${py})`);
                        // Mapeamento: X world = px, Y world (altura) = pz, Z world = py
                        vertices.push(new THREE.Vector3(px, pz, py));
                    }

                    const novaGeo = new THREE.BufferGeometry().setFromPoints(vertices);
                    novaGeo.setIndex(geoBase.getIndex());
                    novaGeo.computeVertexNormals();

                    const material = new THREE.MeshPhongMaterial({
                        color: 0x3b82f6,
                        transparent: true,
                        opacity: 0.8,
                        side: THREE.DoubleSide,
                        shininess: 40
                    });

                    malhaSuperficie = new THREE.Mesh(novaGeo, material);
                    cena.add(malhaSuperficie);

                    infoPainel.innerHTML = `<p class="text-slate-500 italic text-sm text-center">Gráfico atualizado. Clique para explorar.</p>`;
                } catch (e) {
                    infoPainel.innerHTML = `<p class="text-red-500 text-sm">Erro: ${e.message}</p>`;
                }
            }

            function formatarLaTeX(vx, vy, vz) {
                let partes = [];
                
                // Componente i
                if (Math.abs(vx) > 0.001) {
                    partes.push(`${vx.toFixed(3)}\\mathbf{i}`);
                }
                
                // Componente j
                if (Math.abs(vy) > 0.001) {
                    const sinal = (vy > 0 && partes.length > 0) ? ' + ' : (vy < 0 ? ' - ' : '');
                    const valor = Math.abs(vy).toFixed(3);
                    partes.push(`${sinal}${valor}\\mathbf{j}`);
                }
                
                // Componente k (altura/z fixo em -1 para o gradiente da superfície implícita f(x,y)-z=0)
                const sinalZ = (vz > 0 && partes.length > 0) ? ' + ' : (vz < 0 ? ' - ' : '');
                const valorZ = Math.abs(vz).toFixed(3);
                partes.push(`${sinalZ}${valorZ}\\mathbf{k}`);

                return partes.join('');
            }

            function aoClicar(e) {
                if (!malhaSuperficie) return;

                const rect = renderer.domElement.getBoundingClientRect();
                rato.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
                rato.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

                raycaster.setFromCamera(rato, camara);
                const alvo = raycaster.intersectObject(malhaSuperficie);

                if (alvo.length > 0) {
                    const pontoWorld = alvo[0].point;
                    if (setaVetor) cena.remove(setaVetor);

                    const formula = limparFormula(document.getElementById('input-funcao').value);
                    const dx = math.derivative(formula, 'x').evaluate({x: pontoWorld.x, y: pontoWorld.z});
                    const dy = math.derivative(formula, 'y').evaluate({x: pontoWorld.x, y: pontoWorld.z});
                    
                    // Gradiente de g(x,y,z) = f(x,y) - z -> (fx, fy, -1)
                    // Na nossa cena, Y é a altura, logo o vetor é (dx, -1, dy) em coordenadas ThreeJS
                    // Vamos criar uma seta que aponta na direção normal (gradiente normalizado)
                    const dirVetor = new THREE.Vector3(dx, -1, dy).normalize();
                    setaVetor = new THREE.ArrowHelper(dirVetor, pontoWorld, 2, 0xef4444, 0.4, 0.2);
                    cena.add(setaVetor);

                    const latex = formatarLaTeX(dx, dy, -1.0);

                    infoPainel.innerHTML = `
                        <div class="space-y-3">
                            <div>
                                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Coordenadas</span>
                                <p class="text-xs text-slate-600 font-mono">P(${pontoWorld.x.toFixed(2)}, ${pontoWorld.z.toFixed(2)}, ${pontoWorld.y.toFixed(2)})</p>
                            </div>
                            <div class="h-px bg-slate-200"></div>
                            <div>
                                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Gradiente Local</span>
                                <p class="text-base text-blue-600 font-semibold py-1">$$\\nabla f = ${latex}$$</p>
                            </div>
                        </div>
                    `;
                    MathJax.typesetPromise();
                }
            }

            function calcularVolume() {
                try {
                    const f = limparFormula(document.getElementById('input-funcao').value);
                    const parser = math.parser();
                    parser.evaluate(`f(x, y) = ${f}`);
                    let vol = 0;
                    const div = 40;
                    const d = 20 / div;
                    for (let i = 0; i < div; i++) {
                        for (let j = 0; j < div; j++) {
                            vol += Math.abs(parser.evaluate(`f(${-10 + i * d}, ${-10 + j * d})`)) * d * d;
                        }
                    }
                    infoPainel.innerHTML = `
                        <div class="bg-blue-50 border border-blue-100 p-3 rounded-lg text-center">
                            <span class="text-[10px] font-bold text-blue-400 uppercase tracking-widest">Volume Estimado</span>
                            <p class="text-xl font-black text-blue-600">${vol.toFixed(4)} <span class="text-xs font-normal">u.v.</span></p>
                        </div>
                    `;
                } catch (e) {
                    infoPainel.innerHTML = `<p class="text-red-500">Erro: ${e.message}</p>`;
                }
            }

            function tracoCurva() {
                try {
                    if (objetoCurva) cena.remove(objetoCurva);
                    const xExpr = limparFormula(document.getElementById('input-xt').value);
                    const yExpr = limparFormula(document.getElementById('input-yt').value);
                    const zExpr = limparFormula(document.getElementById('input-funcao').value);
                    const limites = document.getElementById('input-t-range').value.split(',').map(s => math.evaluate(limparFormula(s.trim())));
                    
                    const pts = [];
                    for (let i = 0; i <= 200; i++) {
                        const t = limites[0] + (limites[1] - limites[0]) * (i / 200);
                        const vx = math.evaluate(xExpr, {t: t});
                        const vy = math.evaluate(yExpr, {t: t});
                        const vz = math.evaluate(zExpr, {x: vx, y: vy});
                        pts.push(new THREE.Vector3(vx, vz, vy));
                    }
                    const geo = new THREE.BufferGeometry().setFromPoints(pts);
                    objetoCurva = new THREE.Line(geo, new THREE.LineBasicMaterial({ color: 0xf59e0b, linewidth: 3 }));
                    cena.add(objetoCurva);
                } catch (e) {
                    infoPainel.innerHTML = `<p class="text-red-500">Erro Curva: ${e.message}</p>`;
                }
            }

            document.getElementById('btn-renderizar').addEventListener('click', desenharSuperficie);
            document.getElementById('btn-integral-area').addEventListener('click', calcularVolume);
            document.getElementById('btn-tracar-linha').addEventListener('click', tracoCurva);
            
            // Interaction listener
            renderer.domElement.addEventListener('pointerdown', aoClicar);

            window.addEventListener('resize', () => {
                camara.aspect = contentor.clientWidth / contentor.clientHeight;
                camara.updateProjectionMatrix();
                renderer.setSize(contentor.clientWidth, contentor.clientHeight);
            });

            function loop() {
                requestAnimationFrame(loop);
                controlos.update();
                renderer.render(cena, camara);
            }

            desenharSuperficie();
            loop();
        };
    </script>
</body>
</html>
